<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
            <!-- PyScript CDN 추가 -->
    <link rel="stylesheet" href="https://pyscript.net" />
    <script defer src="https://pyscript.net"></script>
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
        }
        .sidebar {
            width: 220px;
            background: #f4f4f4;
            height: 100vh;
            padding: 30px 0 0 10px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.04);
            position: fixed;
            top: 0;
            left: 0;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar li {
            margin: 18px 0;
        }
        .sidebar a {
            text-decoration: none;
            color: #333;
            font-size: 1.1em;
            transition: color 0.2s;
        }
        .sidebar a:hover {
            color: #0078d4;
        }
        .main {
            margin-left: 240px;
            padding: 40px;
            width: 100%;
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <h3>[과정 목차]</h3>
        <ul>
            <li><a href="#" onclick="loadLecture('chap1.html'); return false;">1과. 바이브코딩 이해</a></li>
            <li><a href="#" onclick="loadLecture('chap2.html'); return false;">2과. AI 활용1</a></li>
            <li><a href="#" onclick="loadLecture('day3.html'); return false;">3일차 강의</a></li>
            <li><a href="#" onclick="loadLecture('day4.html'); return false;">4일차 강의</a></li>
            <li><a href="#" onclick="loadLecture('day5.html'); return false;">5일차 강의</a></li>
        </ul>
    </nav>
    <div class="main">
        <iframe id="lectureFrame" src="chap1.html" style="width:100%; min-height:80vh; border:none; background:#fafbfc;"></iframe>
    </div>
    <script>
        function loadLecture(page) {
            document.getElementById('lectureFrame').src = page;
        }
    </script>
</body>
</html>
